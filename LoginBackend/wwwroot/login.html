<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="02f418a4-47db-40e5-9068-6d37a57ec3ef.mp4" type="video/mp4">
  </video>

  <header>
    <img src="images-removebg-preview.png">
  </header>

  <main>
    <div class="login-container">
      <form action="/login" method="post">
        <h2>Login</h2>

        <!-- Show error if ?error=1 -->
        <p id="error-msg" style="
          color:#ef4444;
          text-align:center;
          margin-bottom:10px;
          display:none;
          font-weight:bold;">
          ❌ Invalid username or password.
        </p>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
      </form>
    </div>
  </main>

  <footer>
    <a href="#">CALVO, SHINJI LEI</a>
    <a href="#">BADILLA</a>
    <a href="#">CAMINGAWAN</a>
    <a href="#">MR. LEADER</a>
    <a href="#">UNKNOWN</a>
  </footer>

  <script>
    // Show error message if redirected back with ?error=1
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>

</body>
</html>
